# Transfer today's (or chosen date) hoot_inventory rows into inventorydata via
# public.run_inventory_from_hoot(p_date).
#
# Required repository secrets:
#   SUPABASE_URL
#   SUPABASE_SERVICE_ROLE_KEY
#
# Optional variables/secrets:
#   HOOT_TRANSFER_DATE  YYYY-MM-DD (default: today)

name: Hoot to inventorydata transfer

on:
  schedule:
    # Run after Hoot import workflow (04:15 UTC): here 04:45 UTC daily.
    #- cron: '45 4 * * *'
  workflow_dispatch:
    inputs:
      transfer_date:
        description: Optional YYYY-MM-DD (leave empty for today)
        required: false
        type: string

concurrency:
  group: hoot-to-inventorydata-transfer
  cancel-in-progress: false

jobs:
  transfer:
    name: Run SQL transfer function
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: scripts/hoot_inventory/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/hoot_inventory/requirements.txt

      - name: Transfer hoot_inventory -> inventorydata
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          HOOT_TRANSFER_DATE: ${{ inputs.transfer_date || secrets.HOOT_TRANSFER_DATE || vars.HOOT_TRANSFER_DATE }}
        run: |
          set -e
          if [ -z "${SUPABASE_URL}" ] || [ -z "${SUPABASE_SERVICE_ROLE_KEY}" ]; then
            echo "::error::Missing SUPABASE_URL or SUPABASE_SERVICE_ROLE_KEY secrets."
            exit 1
          fi
          echo "HOOT_TRANSFER_DATE=${HOOT_TRANSFER_DATE:-<today>}"
          python scripts/hoot_inventory/hoot_to_inventorydata.py
